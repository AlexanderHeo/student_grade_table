<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGT in HTML</title>
  <link rel="stylesheet" href="./server/public/styles.css">
</head>
<body>
  <div class="sgt">
    <div class="header">
      <div class="heading">
        <h1>Student Grade Table</h1>
      </div>
      <div class="avgGradeMain">
        <div class="avgGradeContainer">
          <div class="avgGradeLabel">
            <h2>Average Grade:</h2>
          </div>
          <div class="gradeBox">
            <h2>100</h2>
          </div>
        </div>
      </div>
    </div>
    <div class="gradetable">
      <table>
        <thead>
          <tr>
            <th>Student Name</th>
            <th>Course</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Daft Punk</td>
            <td>Electronica</td>
            <td>100</td>
          </tr>
          <tr>
            <td>Iron Maiden</td>
            <td>Heavy Metal</td>
            <td>100</td>
          </tr>
          <tr>
            <td>The Beatles</td>
            <td>Classic Rock</td>
            <td>100</td>
          </tr>
          <tr>
            <td>Muse</td>
            <td>Progressive Art Rock</td>
            <td>100</td>
          </tr>
          <tr>
            <td>Stone Roses</td>
            <td>Neo-psychedelic Indie Rock</td>
            <td>100</td>
          </tr>
        </tbody>
      </table>
      <div class="enter-form">
        <form action="submit">
          <div class="form-section">
            <label for="name">
              <div class="box"></div>
            </label>
            <input type="text" placeholder="Name">
          </div>
          <div class="form-section">
            <label for="course">
              <div class="box"></div>
            </label>
            <input type="text" placeholder="Course">
          </div>
          <div class="form-section">
            <label for="grade">
              <div class="box"></div>
            </label>
            <input type="number" placeholder="Grade">
          </div>
        </form>
        <div>
          <div class="buttonContainer">
            <button>Add</button>
            <button>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
